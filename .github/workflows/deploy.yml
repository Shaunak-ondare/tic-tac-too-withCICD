name: Deploy to Amazon EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}                   
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}               
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}       

jobs:
  # ------------------------------------------------------------------------
  # STAGE 1: Build Docker Images and Push to Amazon ECR
  # ------------------------------------------------------------------------
  build_and_push:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::823963318980:role/github-actions-oidc-role
        aws-region: ap-south-1

    - name: Verify AWS Identity
      run: aws sts get-caller-identity

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push Backend Image
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY:backend-$IMAGE_TAG ./backend
        docker push $ECR_REGISTRY:backend-$IMAGE_TAG

    - name: Build and Push Frontend Image
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY:frontend-$IMAGE_TAG ./frontend
        docker push $ECR_REGISTRY:frontend-$IMAGE_TAG

  # ------------------------------------------------------------------------
  # STAGE 2: Provision Infrastructure using Terraform
  # ------------------------------------------------------------------------
  terraform_infrastructure:
    name: Terraform EKS Infrastructure
    runs-on: ubuntu-latest
    needs: build_and_push   # This guarantees this job only starts if Stage 1 succeeds
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::823963318980:role/github-actions-oidc-role
        aws-region: ap-south-1

    - name: Verify AWS Identity
      run: aws sts get-caller-identity

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.6.0"

    - name: Terraform Apply (Infrastructure Only)
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd terraform
        terraform init
        terraform apply -target=module.main_vpc -target=module.eks_cluster -auto-approve \
          -var="frontend_image=$ECR_REGISTRY:frontend-$IMAGE_TAG" \
          -var="backend_image=$ECR_REGISTRY:backend-$IMAGE_TAG"

  # ------------------------------------------------------------------------
  # STAGE 3: Deploy Application securely into EKS using YAML Manifests
  # ------------------------------------------------------------------------
  deploy_application:
    name: Kubernetes Application Deployment
    runs-on: ubuntu-latest
    needs: terraform_infrastructure   # Waits for EKS cluster to finish provisioning
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::823963318980:role/github-actions-oidc-role
        aws-region: ap-south-1

    - name: Verify AWS Identity
      run: aws sts get-caller-identity

    - name: Update Kubeconfig
      run: aws eks update-kubeconfig --region ap-south-1 --name ${{ secrets.EKS_CLUSTER_NAME }}

    - name: Deploy Manifests
      env:
        BACKEND_IMAGE: ${{ secrets.ECR_REGISTRY }}:backend-${{ github.sha }}
        FRONTEND_IMAGE: ${{ secrets.ECR_REGISTRY }}:frontend-${{ github.sha }}
      run: |
        # Inject dynamic images into manifests
        kubectl apply -f k8s/namespace.yaml
        envsubst < k8s/configmap.yaml | kubectl apply -f -
        envsubst < k8s/backend.yaml | kubectl apply -f -
        envsubst < k8s/frontend.yaml | kubectl apply -f -
