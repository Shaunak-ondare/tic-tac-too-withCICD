name: Deploy to Amazon EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}                   # e.g., us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}               # e.g., 123456789012.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}       # Name of the EKS cluster

jobs:
  deploy:
    name: Build, Push to ECR, and Deploy to EKS
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.6.0"

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push backend image to Amazon ECR
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/tictactoe-backend:$IMAGE_TAG ./backend
        docker push $ECR_REGISTRY/tictactoe-backend:$IMAGE_TAG

    - name: Build, tag, and push frontend image to Amazon ECR
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/tictactoe-frontend:$IMAGE_TAG ./frontend
        docker push $ECR_REGISTRY/tictactoe-frontend:$IMAGE_TAG

    - name: Deploy Infrastructure and Application with Terraform
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd terraform
        terraform init
        terraform apply -auto-approve \
          -var="frontend_image=$ECR_REGISTRY/tictactoe-frontend:$IMAGE_TAG" \
          -var="backend_image=$ECR_REGISTRY/tictactoe-backend:$IMAGE_TAG"
