name: Deploy to Amazon EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}                   
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}               
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}       

jobs:
  # ------------------------------------------------------------------------
  # STAGE 1: Build Docker Images and Push to Amazon ECR
  # ------------------------------------------------------------------------
  build_and_push:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push Backend Image
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/tictactoe-backend:$IMAGE_TAG ./backend
        docker push $ECR_REGISTRY/tictactoe-backend:$IMAGE_TAG

    - name: Build and Push Frontend Image
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/tictactoe-frontend:$IMAGE_TAG ./frontend
        docker push $ECR_REGISTRY/tictactoe-frontend:$IMAGE_TAG

  # ------------------------------------------------------------------------
  # STAGE 2: Provision Infrastructure using Terraform
  # ------------------------------------------------------------------------
  terraform_infrastructure:
    name: Terraform EKS Infrastructure
    runs-on: ubuntu-latest
    needs: build_and_push   # This guarantees this job only starts if Stage 1 succeeds
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.6.0"

    - name: Terraform Apply (Infrastructure Only)
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd terraform
        terraform init
        terraform apply -target=module.vpc -target=module.eks -auto-approve \
          -var="frontend_image=$ECR_REGISTRY/tictactoe-frontend:$IMAGE_TAG" \
          -var="backend_image=$ECR_REGISTRY/tictactoe-backend:$IMAGE_TAG"

  # ------------------------------------------------------------------------
  # STAGE 3: Deploy Application securely into EKS
  # ------------------------------------------------------------------------
  terraform_application:
    name: Kubernetes Application Deployment
    runs-on: ubuntu-latest
    needs: terraform_infrastructure   # Waits for EKS cluster to finish provisioning
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.6.0"

    - name: Terraform Apply (Kubernetes Pods & Services)
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd terraform
        terraform init
        terraform apply -auto-approve \
          -var="frontend_image=$ECR_REGISTRY/tictactoe-frontend:$IMAGE_TAG" \
          -var="backend_image=$ECR_REGISTRY/tictactoe-backend:$IMAGE_TAG"
