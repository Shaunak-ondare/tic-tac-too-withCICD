apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tic-tac-toe-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Shaunak-ondare/tic-tac-too-withCICD.git'
    targetRevision: HEAD
    path: k8s-argo
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: tic-tac-toe
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
