apiVersion: karpenter.sh/v1alpha5
kind: Provisioner
metadata:
  name: default
spec:
  requirements:
    - key: node.kubernetes.io/instance-type
      operator: In
      values: ["c7i.flex.large"]

  limits:
    resources:
      cpu: "1000"

  providerRef:
    name: default

  ttlSecondsAfterEmpty: 30